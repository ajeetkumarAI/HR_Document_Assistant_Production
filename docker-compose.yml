version: "3.9"

services:
  backend:
    build: ./backend
    container_name: hr-assistant-backend
    ports:
      - "8000:8000"
    volumes:
      - vector_data:/app/db
      - upload_data:/app/data/uploads
      - ./config:/app/../config:ro
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: hr-assistant-frontend
    ports:
      - "8501:8501"
    env_file:
      - ./frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vector_data:
  upload_data:
